<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>TABELA INCRIVEL</h1>

    <!-- Criando uma tabela -->
     <table border="5"> 
        <!-- Cabecalho da tabela -->
         <thead></thead>

         <!-- Corpo da Tabela -->
        <tbody>
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                 <th><mark>NOME</mark></th>
                 <th><mark>ITEM</mark></th>
                 <th><mark>QUANTIDADE</mark></th>
                 <th><mark>PREÇO</mark></th>
            </tr>
        </tbody>
    
        <!-- Cabecalho da tabela -->
         <thead></thead>

         <!-- Corpo da Tabela -->
        <tbody>
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                 <td>Murko</td>
                 <td>Protetor solar</td>
                 <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1</td>
                 <td>R$60,00</td>
            </tr>
        </tbody>
        <!-- Cabecalho da tabela -->
         <thead></thead>

         <!-- Corpo da Tabela -->
        <tbody>
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                 <td>Mateus</td>
                 <td>Chumbinho</td>
                 <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4</td>
                 <td>R$80,00</td>
            </tr>
        </tbody>
        
        <!-- Cabecalho da tabela -->
         <thead></thead>

         <!-- Corpo da Tabela -->
        <tbody>
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                 <td rowspan="2">Laisa</td>
                 <td>Pó de arroz</td>
                 <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1</td>
                 <td>R$65,00</td>
            </tr>
            <tr>
                <td>Gloss da Fran</td>
                <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1</td>
                <td>R$69,90</td>
            </tr>
        </tbody>
        
        
        <!-- Rodape da Tabela -->
         <tfoot>
            <!-- Colspan = diz quantas colunas ele deve ocupar -->
            <tr>
                <td colspan="4">
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;To com um sono da poha:P
                </td>
            </tr>
         </tfoot>
     </table>
</body>
</html>
