<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulários</title>
  </head>
  <body>
    <h1>Formulários - tipos de input</h1>
    <!-- Input - coleta informações -->
    <!-- <input type="text"> -->

    <!-- Tag que engloba os campos do formulário -->
    <form action="" method="">
        <!-- fieldset = segmenta o formulário em áreas -->
        <fieldset>

            <!-- legend - legenda para aquele trecho do formulário -->
            <legend>Dados de login</legend>
      <!-- Forma 1 - Label depois input -->
      <!-- Label = texto para guiar o imput -->
      <!-- for = atributo que vincula o label ao input -->
      <label for="nome">Nome:</label>

      <!--  id = identificação única daquele elemento -->
      <!-- name = usado para identificar o input quando enviar os dados -->
      <!-- placeholder = texto que aparece dentro do input como orientação -->
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Digite o seu nome completo"
      />

      <br />
      <br />
      <!-- Forma 2 - input dentro do label -->
      <label>
        Email:
        <input
          type="email"
          name="email"
          id="email"
          placeholder="email@email.com"
        />
      </label>
      <br />
      <br />
      <!-- Caxinha de senha-->
      <label for="senha">Senha:</label>
      <input
        type="password"
        id="senha"
        name="senha"
        id="senha"
        placeholder="Digite sua senha"
      />
      <br />
      <br />

      <!-- Caixinha de botão -->
      <input type="submit" name="Login" id="login" value="Login" />

      </fieldset>
    </form>

    <br />
    <br />
    <!-- OUTROS INPUTS TOP -->

    <h2> Datas </h2>
    <!-- Só a data -->
    <label for="input-data">Data</label>
    <input type="date" name="input-data" id="input-data" />
    <!-- Data e hora -->
     <input type="datetime-local" name="" id=""/>
     <!-- Só hora -->
      <input type="time" name="" id="" >

      <h2>Telefone</h2>
      <!-- Telefone -->
    <input 
        type="tel" 
        pattern="[0-9]{3}--[0-9]{5}--[0-9]{4}"
        placeholder="(021) 99999-9999"
    />

    <!-- Números -->
     <h2> Números </h2>
     <input type="number" name="" id="" min="-50" max="100"
     value="7">

     <br><br>
     <!-- Barrinha -->
      <h2>Barrinha</h2>
      <label for="">Barra top</label>
      0
      <input type="range" min="0" max="100" value="20" step="20">
      100

    <!-- Texto grande -->
    <h2>Caixa de texto grande</h2>
    <textarea name="" id="" placeholder="Bibliografia...">        
    </textarea>

    <!-- Cores -->
     <h2>Seletor de cor</h2>
     <input type="color">

     <!-- Caixas de seleção -->
      <h3>Seleção</h3>

    <!-- Bolinha - usado pra selecionar uma opção dentre as várias -->
    <label for="">Seleciona seu Curso: </label>
    <br>
    <input type="radio" name="cursoEscolhido" value="TI">
    <input type="radio" name="cursoEscolhido" value="Jogos">
    <input type="radio" name="cursoEscolhido" value="Design">

    <br><br>

    <!-- Caixinha - usada para selecionar várias opções -->
     <label for="">Selecione quais redes você utiliza</label> <br>
     <input type="checkbox" name="rede1" value="TT"> TikTok
     <input type="checkbox" name="rede2" value="Zap"> Zap
     <input type="checkbox" name="rede3" value="Uol"> Uol bate papo
     
     <br><br>

     <!-- Caixa de seleção -->
     <label for="">Selecione sua cidade</label>
     <select name="cidade" id="caixa-cidade"></select>
        <option value="Rio">Rio de Janeiro</option>
        <option value="Toquio">Tóquio</option>
        <option value="BC">B.C</option>
    
        <!-- Grupo de opções -->
         <optgroup name="ES" value="ES" label="Espirito Santo">
            <option value="Cari">Cariacica</option>
            <option value="Cara"></option>
            <option value="Feu">Feu Rosa</option>
            <option value="Gua">Guarapari</option>
         </optgroup>
     </select>

     <!-- Reset -->
      <input type="reset" value="Resetar">
    </body>
</html>
