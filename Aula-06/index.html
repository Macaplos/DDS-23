<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posições</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> Trabalhando Posições</h1>

      <!-- DIV ESTATICA -->
     <div class="pai" id="pai-estatico">
        <div class="filho" id="filho-estatico"></div>
     </div>

      <!-- DIV FIXA -->
     <div class="pai" id="pai-fixo">
        <div class="filho" id="filho-fixo"></div>
     </div>

      <!-- DIV GRUDADO -->
     <div class="pai" id="pai-grudado">
        <div class="filho" id="filho-grudado"></div>
     </div>

      <!-- DIV RELATIVA -->
     <div class="pai" id="pai-relativa">
        <div class="filho" id="filho-relativa"></div>
     </div>

      <!-- DIV ABSOLUTAS -->
      <!-- DIV ABSOLUTA COM PAI ESTATICO -->
     </div>
     <div class="pai" id="pai-absoluto">
        <div class="filho" id="filho-absoluto"></div>
     </div>

     <!-- DIV ABSOLUTA COM PAI NÃO ESTATICO -->
     </div>
     <div class="pai" id="pai-absoluto-relativo">
        <div class="filho" id="filho-absoluto-relativo"></div>
     </div>

     <!--  -->
     </div>
     <div class="pai">
        <div class="filho"></div>
     </div>
     
</body>
</html>
